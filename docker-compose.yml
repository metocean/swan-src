version: '2'

services:

  # Install ifort and libraries required for static model compilation
  comp:
    image: metocean/swan:comp-py3_nvidia
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        mpich_version: 3.2
        hdf5_version: 1.10.1
        netcdf_version: 4.4.1
        netcdf_fortran_version: 4.4.4

  # Build and install model binaries
  model:
    image: metocean/swan:model-py3_nvidia
    build:
      context: ./
      dockerfile: Dockerfile-model
      args:
        ftn: msl
        default_mode: mpi
    depends_on:
      - comp
  
  # Build test image
  test:
    image: metocean/swan:modeltest-py3_nvidia
    build:
      context: ./
      dockerfile: Dockerfile-test
      args:
        ftnref: stock
        default_mode: mpi
        imp: tinyapp # implementation to be used in tests
    depends_on:
      - model

  # Run tests (currently not working because os.system inside pytest)
  test_src:
    image: metocean/swan:modeltest-py3_nvidia
    command: /bin/bash -c "cd /usr/local/bin && pytest -v -s test_src.py --models=4120,4120"
    # volumes: # for dev only
    #   - /source/swan-src/tests/test_src.py:/usr/local/bin/test_src.py
    #   - /tmp:/tmp

  # test_omp:
  #   image: metocean/swan:modeltest
