version: '2'

services:

  # Install ifort and libraries required for static model compilation
  comp:
    image: metocean/swan:comp-${SWAN_IMAGE_TAG_SUFFIX}
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        mpich_version: 3.2
        hdf5_version: 1.10.1
        netcdf_version: 4.4.1
        netcdf_fortran_version: 4.4.4

  # Build and install model binaries
  model:
    image: metocean/swan:model-${SWAN_IMAGE_TAG_SUFFIX}
    build:
      context: ./
      dockerfile: Dockerfile-model
      args:
        ftn: msl
        default_mode: mpi
        SWAN_IMAGE_TAG_SUFFIX: ${SWAN_IMAGE_TAG_SUFFIX}
    depends_on:
      - comp
  
  # Build test image
  test:
    image: metocean/swan:modeltest-${SWAN_IMAGE_TAG_SUFFIX}
    build:
      context: ./
      dockerfile: Dockerfile-test
      args:
        ftnref: stock
        default_mode: mpi
        imp: tinyapp # imp to be used in tests
        SWAN_IMAGE_TAG_SUFFIX: ${SWAN_IMAGE_TAG_SUFFIX}
    depends_on:
      - model

  # Run tests (currently not working because os.system inside pytest)
  test_src:
    image: metocean/swan:modeltest-${SWAN_IMAGE_TAG_SUFFIX}
    command: /bin/bash -c "cd /usr/local/bin && pytest -v -s test_src.py --models=4120,4120 --log-cli-level=INFO"
    #volumes: # for dev only
    #  - /source/swan-src/tests/test_src.py:/usr/local/bin/test_src.py
    #  - /tmp:/tmp

  test_omp:
    image: metocean/swan:modeltest-${SWAN_IMAGE_TAG_SUFFIX}
    command: bash -c "cd /usr/local/bin && pytest -s test_omp.py --imp=socean --ncores=4 --log-cli-level=INFO"
    volumes:
     - /source/swan-src/tests/test_omp.py:/usr/local/bin/test_omp.py
     - /source/swan-src/tests/conftest.py:/usr/local/bin/conftest.py
     - /source/swan-src/tests/socean.tar.gz:/home/metocean/socean.tar.gz # set as needed
    #  - /home/metocean:/home/metocean
