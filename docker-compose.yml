version: '2'

services:

  # Install ifort and libraries required for static model compilation
  comp:
    image: metocean/swan:comp
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        mpich_version: 3.2
        hdf5_version: 1.10.1
        netcdf_version: 4.4.1
        netcdf_fortran_version: 4.4.4

  # Build and install model binaries
  model:
    image: metocean/swan:model
    build:
      context: ./
      dockerfile: Dockerfile-model
      args:
        ftn: msl
        default_mode: mpi
    depends_on:
      - comp
  
  # Build test image
  test:
    image: metocean/swan:modeltest
    build:
      context: ./
      dockerfile: Dockerfile-test
      args:
        ftnref: stock
        default_mode: mpi
        imp: tinyapp # implementation to be used in tests
    depends_on:
      - model

  # Run tests
  test_src:
    image: metocean/swan:modeltest
    # volumes:
    #   - /home/metocean:/home/metocean
    #   - /source/swan-src:/source/swan-src # to debug
    command: bash -c "cd /usr/local/bin && cp /source/swan-src/tests/test_src.py . && pytest -v -s test_src.py --models=4120,4120"

  # test_omp:
  #   image: metocean/swan:modeltest
  #   volumes:
  #     - /home/metocean:/home/metocean
  #   command: bash -c "cd /usr/local/bin && pytest -s test_omp.py"